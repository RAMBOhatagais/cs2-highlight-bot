<!DOCTYPE html>
<html>
<head>
  <title>CS2 Highlights</title>
  <style>
    body { font-family: Arial; background:#111; color:white; margin:0; padding:20px; }
    nav { margin-bottom:20px; }
    nav a { margin-right:15px; color:#00ff88; text-decoration:none; }
    .clip { margin:20px 0; padding:20px; background:#1e1e1e; border-radius:10px; }
    video { width:100%; border-radius:10px; }
    button { padding:8px 15px; background:#00ff88; border:none; cursor:pointer; margin-top:10px; }
  </style>
</head>
<body>

<nav>
  <a href="/">🏠 Home</a>
  <a href="/upload.html">📤 Upload</a>
  <a href="/profile.html">👤 Profile</a>
  <a href="/login.html">🔐 Login</a>
  <a href="/register.html">📝 Register</a>
</nav>

<h1>🔥 CS2 Highlights 🔥</h1>
<div id="clips"></div>

<script>
async function loadClips() {
  const res = await fetch("/api/clips");
  const clips = await res.json();
  const container = document.getElementById("clips");
  container.innerHTML = "";

  clips.forEach(clip => {
    container.innerHTML += `
      <div class="clip">
        <h3>${clip.username}</h3>
        <video controls>
          <source src="${clip.videoUrl}" type="video/mp4">
        </video>
        <p>👍 Likes: <span id="likes-${clip._id}">${clip.likes}</span></p>
        <button onclick="likeClip('${clip._id}')">Like</button>
      </div>
    `;
  });
}

async function likeClip(id) {
  const token = localStorage.getItem("token");
  if (!token) return alert("Du måste vara inloggad");

  const res = await fetch("/api/like/" + id, {
    method: "POST",
    headers: { "Authorization": token }
  });

  const data = await res.json();
  document.getElementById("likes-" + id).innerText = data.likes;
}

loadClips();
</script>

</body>
</html>
